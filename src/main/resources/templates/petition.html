<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${petition.title}">View Petition</title>
    <meta charset="UTF-8">
</head>
<body>
<h1 th:text="${petition.title}">Petition Title</h1>

<p th:text="${petition.description}">Petition description</p>

<p><strong>Number of signatures:</strong> <span th:text="${#lists.size(petition.signatures)}">0</span></p>

<h2>Sign this Petition</h2>

<form th:action="@{/petition/{id}/sign(id=${petition.id})}" method="post">
    <p>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
    </p>

    <p>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
    </p>

    <p>
        <button type="submit">Sign Petition</button>
    </p>
</form>

<p>
    <a th:href="@{/}">Home</a>
</p>

<p>
    <a th:href="@{/petitions}">Back to all petitions</a>
</p>

</body>
</html>
