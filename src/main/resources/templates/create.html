<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Petition</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Create a Petition</h1>

<form th:action="@{/create}" method="post">
    <p>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
    </p>

    <p>
        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="5" cols="40" required></textarea>
    </p>

    <p>
        <button type="submit">Create Petition</button>
    </p>
</form>

<p>
    <a th:href="@{/petitions}">Back to all petitions</a>
</p>
</body>
</html>
