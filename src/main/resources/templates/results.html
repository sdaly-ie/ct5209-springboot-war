<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Results</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Search Results</h1>

<p>
    Results for:
    <strong th:text="${keyword}">keyword</strong>
</p>

<ul>
    <li th:each="petition : ${results}">
        <a th:href="@{/petition/{id}(id=${petition.id})}"
           th:text="${petition.title}">Petition title</a>
    </li>
</ul>

<p><a href="/search">Back to search</a></p>
<p><a href="/petitions">Back to all petitions</a></p>
</body>
</html>
